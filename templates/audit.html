{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Audit Log</h2>
  <div class="table-wrap" style="margin-top:16px;">
    <table>
      <thead><tr><th>Date Time</th><th>Action</th><th>User</th><th>Details</th></tr></thead>
      <tbody>
        {% for row in rows %}
        <tr><td>{{ row.created_at }}</td><td>{{ row.action }}</td><td>{{ row.username }}</td><td>{{ row.details }}</td></tr>
        {% else %}
        <tr><td colspan="4">No audit records.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
